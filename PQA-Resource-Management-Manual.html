document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);

    // events at the element — warn only; real JS errors carry message/error.

      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).

    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ange: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; background: #EFE6DA; font-family: 'Noto Sans Thai', system-ui, sans-serif; color: #221C15; -webkit-font-smoothing: antialiased; }\n  a { color: #B75B36; }\n  a:hover { color: #8F4527; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"max-width: 1000px; margin: 0 auto; padding: 32px 20px 72px;\">\n\n  <!-- ============ COVER ============ -->\n  <div style=\"border-radius: 22px; overflow: hidden; box-shadow: 0 18px 50px rgba(34,28,21,0.14);\">\n    <div style=\"background: linear-gradient(135deg,#8F4527,#B75B36 55%,#C77E4C); padding: 46px 44px 40px; color: #fff; position: relative;\">\n      <div style=\"display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.25); padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; letter-spacing: 0.3px;\">📘 คู่มือการใช้งาน • ฉบับเข้าใจง่าย<\u002Fdiv>\n      <h1 style=\"margin: 18px 0 6px; font-size: 40px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.1;\">PQA Resource Management<\u002Fh1>\n      <p style=\"margin: 0; font-size: 17px; font-weight: 500; color: rgba(255,255,255,0.9); max-width: 640px; line-height: 1.6;\">ระบบวางแผนและจัดสรรทีมทดสอบ (Outsource) ให้กับโปรเจกต์ UAT — รู้ว่าใครทำอะไร อยู่โปรเจกต์ไหน และใครว่างเมื่อไหร่ ในที่เดียว<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background: #fff; padding: 16px 44px; display: flex; flex-wrap: wrap; gap: 26px; font-size: 13.5px; color: rgba(34,28,21,0.62);\">\n      <span>👥 สำหรับ&nbsp;<strong style=\"color:#221C15;\">ทีม PQA / ผู้ดูแลทรัพยากร<\u002Fstrong><\u002Fspan>\n      <span>⏱️ อ่านจบใน&nbsp;<strong style=\"color:#221C15;\">5 นาที<\u002Fstrong><\u002Fspan>\n      <span>🗂️ ครอบคลุม&nbsp;<strong style=\"color:#221C15;\">5 เมนูหลัก<\u002Fstrong><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ WHAT IS IT ============ -->\n  <div style=\"margin-top: 40px;\">\n    <div style=\"font-size: 13px; font-weight: 700; color: #B75B36; letter-spacing: 1px; text-transform: uppercase;\">ระบบนี้ทำอะไร<\u002Fdiv>\n    <h2 style=\"margin: 6px 0 14px; font-size: 26px; font-weight: 800;\">จับคู่ “คน” กับ “งาน” ให้ลงตัว<\u002Fh2>\n    <p style=\"margin: 0 0 24px; font-size: 15.5px; line-height: 1.75; color: rgba(34,28,21,0.72); max-width: 780px;\">แต่ละโปรเจกต์ทดสอบมีหลายช่วงงาน (Phase) และต้องใช้คนทดสอบจำนวนหนึ่งในแต่ละช่วง ระบบช่วยให้คุณ <strong>สร้างโปรเจกต์ → กำหนดช่วงเวลาแต่ละ Phase → จองคนเข้าไปทำงาน → แล้วติดตามภาระงานและวันว่าง<\u002Fstrong> ได้ทั้งหมดจากหน้าเดียว โดยกันไม่ให้จองคนเกินกำลัง<\u002Fp>\n\n    <!-- Flow diagram -->\n    <div style=\"display: flex; align-items: stretch; gap: 10px; flex-wrap: wrap;\">\n      <div style=\"flex: 1; min-width: 150px; background: #fff; border: 1px solid rgba(34,28,21,0.1); border-radius: 14px; padding: 18px 16px; text-align: center; box-shadow: 0 6px 20px rgba(34,28,21,0.05);\">\n        <div style=\"font-size: 28px;\">📊<\u002Fdiv>\n        <div style=\"margin-top: 8px; font-weight: 700; font-size: 15px;\">1. สร้างโปรเจกต์<\u002Fdiv>\n        <div style=\"margin-top: 4px; font-size: 12.5px; color: rgba(34,28,21,0.55); line-height: 1.5;\">ตั้งชื่องานและระบบที่จะทดสอบ<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; align-items: center; color: #B75B36; font-size: 24px; font-weight: 800;\">→<\u002Fdiv>\n      <div style=\"flex: 1; min-width: 150px; background: #fff; border: 1px solid rgba(34,28,21,0.1); border-radius: 14px; padding: 18px 16px; text-align: center; box-shadow: 0 6px 20px rgba(34,28,21,0.05);\">\n        <div style=\"font-size: 28px;\">🗓️<\u002Fdiv>\n        <div style=\"margin-top: 8px; font-weight: 700; font-size: 15px;\">2. กำหนด Phase<\u002Fdiv>\n        <div style=\"margin-top: 4px; font-size: 12.5px; color: rgba(34,28,21,0.55); line-height: 1.5;\">ใส่วันที่ SIT / UAT / Regression ฯลฯ<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; align-items: center; color: #B75B36; font-size: 24px; font-weight: 800;\">→<\u002Fdiv>\n      <div style=\"flex: 1; min-width: 150px; background: #fff; border: 1px solid rgba(34,28,21,0.1); border-radius: 14px; padding: 18px 16px; text-align: center; box-shadow: 0 6px 20px rgba(34,28,21,0.05);\">\n        <div style=\"font-size: 28px;\">🙋<\u002Fdiv>\n        <div style=\"margin-top: 8px; font-weight: 700; font-size: 15px;\">3. จองคน<\u002Fdiv>\n        <div style=\"margin-top: 4px; font-size: 12.5px; color: rgba(34,28,21,0.55); line-height: 1.5;\">เลือกคนว่างมาลงแต่ละ Phase<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; align-items: center; color: #B75B36; font-size: 24px; font-weight: 800;\">→<\u002Fdiv>\n      <div style=\"flex: 1; min-width: 150px; background: #fff; border: 1px solid rgba(34,28,21,0.1); border-radius: 14px; padding: 18px 16px; text-align: center; box-shadow: 0 6px 20px rgba(34,28,21,0.05);\">\n        <div style=\"font-size: 28px;\">📈<\u002Fdiv>\n        <div style=\"margin-top: 8px; font-weight: 700; font-size: 15px;\">4. ติดตามผล<\u002Fdiv>\n        <div style=\"margin-top: 4px; font-size: 12.5px; color: rgba(34,28,21,0.55); line-height: 1.5;\">ดูภาระงาน วันว่าง และรายงาน<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ 5 MENUS ============ -->\n  <div style=\"margin-top: 46px;\">\n    <div style=\"font-size: 13px; font-weight: 700; color: #B75B36; letter-spacing: 1px; text-transform: uppercase;\">แผนที่ระบบ<\u002Fdiv>\n    <h2 style=\"margin: 6px 0 18px; font-size: 26px; font-weight: 800;\">5 เมนูหลัก (แถบด้านซ้าย)<\u002Fh2>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px;\">\n      <div style=\"background:#fff; border:1px solid rgba(34,28,21,0.1); border-radius:14px; padding:18px; display:flex; gap:14px; box-shadow:0 6px 20px rgba(34,28,21,0.05);\">\n        <div style=\"flex:0 0 46px; height:46px; border-radius:12px; background:rgba(183,91,54,0.13); display:flex; align-items:center; justify-content:center; font-size:22px;\">📊<\u002Fdiv>\n        <div><div style=\"font-weight:700; font-size:16px;\">Project<\u002Fdiv><div style=\"font-size:13px; color:rgba(34,28,21,0.6); line-height:1.55; margin-top:2px;\">ไทม์ไลน์ (Gantt) ของทุกโปรเจกต์ — สร้าง/แก้ไขงาน และจองคนเข้า Phase<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid rgba(34,28,21,0.1); border-radius:14px; padding:18px; display:flex; gap:14px; box-shadow:0 6px 20px rgba(34,28,21,0.05);\">\n        <div style=\"flex:0 0 46px; height:46px; border-radius:12px; background:rgba(183,91,54,0.13); display:flex; align-items:center; justify-content:center; font-size:22px;\">👥<\u002Fdiv>\n        <div><div style=\"font-weight:700; font-size:16px;\">Outsource<\u002Fdiv><div style=\"font-size:13px; color:rgba(34,28,21,0.6); line-height:1.55; margin-top:2px;\">รายชื่อทีมทดสอบ — ใครถูกจอง/ใครว่าง ทักษะ ประวัติงาน และแผนวันลา<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid rgba(34,28,21,0.1); border-radius:14px; padding:18px; display:flex; gap:14px; box-shadow:0 6px 20px rgba(34,28,21,0.05);\">\n        <div style=\"flex:0 0 46px; height:46px; border-radius:12px; background:rgba(183,91,54,0.13); display:flex; align-items:center; justify-content:center; font-size:22px;\">📅<\u002Fdiv>\n        <div><div style=\"font-weight:700; font-size:16px;\">Calendar<\u002Fdiv><div style=\"font-size:13px; color:rgba(34,28,21,0.6); line-height:1.55; margin-top:2px;\">ปฏิทินรายวัน — เทียบจำนวนคนที่จองแล้ว กับที่ต้องการในแต่ละวัน<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid rgba(34,28,21,0.1); border-radius:14px; padding:18px; display:flex; gap:14px; box-shadow:0 6px 20px rgba(34,28,21,0.05);\">\n        <div style=\"flex:0 0 46px; height:46px; border-radius:12px; background:rgba(183,91,54,0.13); display:flex; align-items:center; justify-content:center; font-size:22px;\">📈<\u002Fdiv>\n        <div><div style=\"font-weight:700; font-size:16px;\">Dashboard<\u002Fdiv><div style=\"font-size:13px; color:rgba(34,28,21,0.6); line-height:1.55; margin-top:2px;\">รายงานสรุป — Man-day รวม, แยกตาม App/Phase, สถานะ Signoff และมุมมองราย Lead<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid rgba(34,28,21,0.1); border-radius:14px; padding:18px; display:flex; gap:14px; box-shadow:0 6px 20px rgba(34,28,21,0.05);\">\n        <div style=\"flex:0 0 46px; height:46px; border-radius:12px; background:rgba(183,91,54,0.13); display:flex; align-items:center; justify-content:center; font-size:22px;\">🗂️<\u002Fdiv>\n        <div><div style=\"font-weight:700; font-size:16px;\">Users <span style=\"font-size:11px; font-weight:600; color:#B75B36; background:rgba(183,91,54,0.13); padding:2px 7px; border-radius:6px; vertical-align:middle;\">Admin<\u002Fspan><\u002Fdiv><div style=\"font-size:13px; color:rgba(34,28,21,0.6); line-height:1.55; margin-top:2px;\">จัดการบัญชีผู้ใช้และสิทธิ์ — เห็นเฉพาะผู้ดูแลระบบ<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ KEY CONCEPTS ============ -->\n  <div style=\"margin-top: 46px;\">\n    <div style=\"font-size: 13px; font-weight: 700; color: #B75B36; letter-spacing: 1px; text-transform: uppercase;\">คำศัพท์ที่ต้องรู้<\u002Fdiv>\n    <h2 style=\"margin: 6px 0 18px; font-size: 26px; font-weight: 800;\">4 แนวคิดหลัก<\u002Fh2>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 14px;\">\n\n      <div style=\"background:#fff; border:1px solid rgba(34,28,21,0.1); border-radius:14px; padding:20px; box-shadow:0 6px 20px rgba(34,28,21,0.05);\">\n        <div style=\"font-weight:800; font-size:16px; color:#B75B36;\">Phase (ช่วงงาน)<\u002Fdiv>\n        <p style=\"margin:8px 0 12px; font-size:13px; line-height:1.6; color:rgba(34,28,21,0.65);\">ขั้นตอนของการทดสอบในโปรเจกต์ เรียงตามลำดับ แต่ละ Phase มีสีของตัวเอง<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:5px;\">\n          <div style=\"display:flex; align-items:center; gap:8px; font-size:12.5px;\"><span style=\"width:26px;height:12px;border-radius:3px;background:#C77E4C;\"><\u002Fspan>SIT<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:8px; font-size:12.5px;\"><span style=\"width:26px;height:12px;border-radius:3px;background:#E7BE8E;\"><\u002Fspan>TC Prep (เตรียมเทสเคส)<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:8px; font-size:12.5px;\"><span style=\"width:26px;height:12px;border-radius:3px;background:#B75B36;\"><\u002Fspan>UAT<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:8px; font-size:12.5px;\"><span style=\"width:26px;height:12px;border-radius:3px;background:#8B3E20;\"><\u002Fspan>Regression<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:8px; font-size:12.5px;\"><span style=\"width:26px;height:12px;border-radius:3px;background:#D9A63C;\"><\u002Fspan>Signoff · <span style=\"width:26px;height:12px;border-radius:3px;background:#CE9A5A;\"><\u002Fspan>Deploy<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff; border:1px solid rgba(34,28,21,0.1); border-radius:14px; padding:20px; box-shadow:0 6px 20px rgba(34,28,21,0.05);\">\n        <div style=\"font-weight:800; font-size:16px; color:#B75B36;\">Booking (การจอง)<\u002Fdiv>\n        <p style=\"margin:8px 0 12px; font-size:13px; line-height:1.6; color:rgba(34,28,21,0.65);\">การจับคนหนึ่งคนเข้าไปทำงานใน Phase หนึ่ง ตามช่วงวันที่ที่กำหนด<\u002Fp>\n        <div style=\"background:rgba(29,158,117,0.09); border:1px dashed rgba(29,158,117,0.4); border-radius:10px; padding:10px 12px; font-size:12.5px; line-height:1.5;\">\n          <strong>สมหญิง<\u002Fstrong> → UAT<br>\n          <span style=\"color:rgba(34,28,21,0.55);\">10–24 ก.ค. · 1 MD/วัน<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff; border:1px solid rgba(34,28,21,0.1); border-radius:14px; padding:20px; box-shadow:0 6px 20px rgba(34,28,21,0.05);\">\n        <div style=\"font-weight:800; font-size:16px; color:#B75B36;\">MD (Man-Day)<\u002Fdiv>\n        <p style=\"margin:8px 0 12px; font-size:13px; line-height:1.6; color:rgba(34,28,21,0.65);\">หน่วยวัดภาระงานต่อคนต่อวัน — 1 คนทำได้ <strong>สูงสุด 1.0 MD/วัน<\u002Fstrong><\u002Fp>\n        <div style=\"display:flex; gap:8px;\">\n          <div style=\"flex:1; text-align:center; background:#F7EEE1; border-radius:9px; padding:9px 4px;\"><div style=\"font-size:19px; font-weight:800; color:#B75B36;\">1.0<\u002Fdiv><div style=\"font-size:11px; color:rgba(34,28,21,0.55);\">เต็มวัน<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1; text-align:center; background:#F7EEE1; border-radius:9px; padding:9px 4px;\"><div style=\"font-size:19px; font-weight:800; color:#B75B36;\">0.5<\u002Fdiv><div style=\"font-size:11px; color:rgba(34,28,21,0.55);\">ครึ่งวัน<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff; border:1px solid rgba(34,28,21,0.1); border-radius:14px; padding:20px; box-shadow:0 6px 20px rgba(34,28,21,0.05);\">\n        <div style=\"font-weight:800; font-size:16px; color:#B75B36;\">ว่าง / ถูกจอง<\u002Fdiv>\n        <p style=\"margin:8px 0 12px; font-size:13px; line-height:1.6; color:rgba(34,28,21,0.65);\">สถานะของแต่ละคนในช่วงเวลาหนึ่ง — คนที่ยังจองได้จะขึ้นเป็น “ว่าง”<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:6px;\">\n          <div style=\"display:flex; align-items:center; gap:8px; font-size:12.5px; background:rgba(29,158,117,0.09); border-radius:8px; padding:6px 10px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#1D9E75;\"><\u002Fspan>ถูกจองแล้ว<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:8px; font-size:12.5px; background:#F7EEE1; border-radius:8px; padding:6px 10px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:rgba(34,28,21,0.3);\"><\u002Fspan>ว่าง (จองได้)<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ WALKTHROUGH ============ -->\n  <div style=\"margin-top: 52px;\">\n    <div style=\"font-size: 13px; font-weight: 700; color: #B75B36; letter-spacing: 1px; text-transform: uppercase;\">ทีละหน้า<\u002Fdiv>\n    <h2 style=\"margin: 6px 0 6px; font-size: 26px; font-weight: 800;\">วิธีใช้งานแต่ละหน้า<\u002Fh2>\n  <\u002Fdiv>\n\n  <!-- Step: Login -->\n  <div style=\"margin-top: 22px; background:#fff; border:1px solid rgba(34,28,21,0.1); border-radius:18px; padding:26px; box-shadow:0 8px 28px rgba(34,28,21,0.06); display:grid; grid-template-columns: 1fr 300px; gap:28px; align-items:center;\">\n    <div>\n      <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"flex:0 0 30px; height:30px; border-radius:9px; background:#B75B36; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center; font-size:14px;\">0<\u002Fspan><h3 style=\"margin:0; font-size:20px; font-weight:800;\">เข้าสู่ระบบ<\u002Fh3><\u002Fdiv>\n      <p style=\"margin:12px 0 0; font-size:14px; line-height:1.7; color:rgba(34,28,21,0.7);\">กรอก <strong>Username<\u002Fstrong> และ <strong>Password<\u002Fstrong> ที่ได้รับ แล้วกดเข้าสู่ระบบ ระบบจะจำสิทธิ์ของคุณ (User หรือ Admin) โดยอัตโนมัติ — เมนู <strong>Users<\u002Fstrong> จะปรากฏเฉพาะผู้ที่เป็น Admin<\u002Fp>\n    <\u002Fdiv>\n    <!-- login mock -->\n    <div style=\"background:linear-gradient(135deg,#FBF6EF,#F1E4D4); border:1px solid rgba(34,28,21,0.1); border-radius:14px; padding:20px;\">\n      <div style=\"font-weight:800; font-size:13px; color:#B75B36; text-align:center; margin-bottom:12px;\">PQA Resource Management<\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid rgba(34,28,21,0.15); border-radius:8px; padding:9px 12px; font-size:12px; color:rgba(34,28,21,0.5); margin-bottom:8px;\">👤 Username<\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid rgba(34,28,21,0.15); border-radius:8px; padding:9px 12px; font-size:12px; color:rgba(34,28,21,0.5); margin-bottom:12px;\">🔒 ••••••••<\u002Fdiv>\n      <div style=\"background:#B75B36; color:#fff; text-align:center; border-radius:8px; padding:10px; font-size:13px; font-weight:700;\">เข้าสู่ระบบ<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Step 1: Project / Gantt -->\n  <div style=\"margin-top: 18px; background:#fff; border:1px solid rgba(34,28,21,0.1); border-radius:18px; padding:26px; box-shadow:0 8px 28px rgba(34,28,21,0.06);\">\n    <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"flex:0 0 30px; height:30px; border-radius:9px; background:#B75B36; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center; font-size:14px;\">1<\u002Fspan><h3 style=\"margin:0; font-size:20px; font-weight:800;\">📊 หน้า Project — ไทม์ไลน์ &amp; การจอง<\u002Fh3><\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap:26px; margin-top:18px; align-items:start;\">\n      <div>\n        <p style=\"margin:0 0 12px; font-size:14px; line-height:1.7; color:rgba(34,28,21,0.7);\">หัวใจของระบบ แสดงทุกโปรเจกต์เป็นแถบสีตามช่วงเวลา อ่านง่ายว่างานไหนอยู่ Phase อะไร<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:10px;\">\n          <div style=\"display:flex; gap:10px; font-size:13.5px; line-height:1.55;\"><span style=\"color:#B75B36; font-weight:800;\">1.<\u002Fspan><div><strong>+ Add Project<\u002Fstrong> — สร้างโปรเจกต์ใหม่ ใส่ชื่อ, App และวันที่ของแต่ละ Phase (ระบบคำนวณ MD ให้อัตโนมัติ)<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; font-size:13.5px; line-height:1.55;\"><span style=\"color:#B75B36; font-weight:800;\">2.<\u002Fspan><div>คลิกที่แถบโปรเจกต์เพื่อ <strong>จองคน (Book)<\u002Fstrong> เข้า Phase นั้น — เลือกจากรายชื่อคนที่ว่าง<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; font-size:13.5px; line-height:1.55;\"><span style=\"color:#B75B36; font-weight:800;\">3.<\u002Fspan><div>ตัวเลข <strong>“จองแล้ว / ต้องการ”<\u002Fstrong> ช่วยให้เห็นทันทีว่ายังต้องหาคนเพิ่มอีกไหม<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:14px; background:rgba(183,91,54,0.08); border-left:3px solid #B75B36; border-radius:0 8px 8px 0; padding:10px 14px; font-size:12.5px; line-height:1.6; color:rgba(34,28,21,0.7);\">💡 ถ้าเลื่อนวันเริ่ม Phase ระบบจะเลื่อนการจองของคนในช่วงนั้นตามให้อัตโนมัติ<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- gantt mock -->\n      <div style=\"background:#FBF6EF; border:1px solid rgba(34,28,21,0.1); border-radius:12px; padding:14px;\">\n        <div style=\"display:flex; font-size:10px; color:rgba(34,28,21,0.45); padding:0 0 6px 92px; gap:0; justify-content:space-between;\"><span>ก.ค.<\u002Fspan><span>ส.ค.<\u002Fspan><span>ก.ย.<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:7px;\">\n          <div style=\"flex:0 0 84px; font-size:11px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">Payment Sys<\u002Fdiv>\n          <div style=\"flex:1; height:15px; background:#fff; border-radius:4px; display:flex; overflow:hidden;\"><span style=\"width:18%;\"><\u002Fspan><span style=\"width:20%; background:#C77E4C;\"><\u002Fspan><span style=\"width:26%; background:#B75B36;\"><\u002Fspan><span style=\"width:14%; background:#8B3E20;\"><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:7px;\">\n          <div style=\"flex:0 0 84px; font-size:11px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">Mobile App<\u002Fdiv>\n          <div style=\"flex:1; height:15px; background:#fff; border-radius:4px; display:flex; overflow:hidden;\"><span style=\"width:34%;\"><\u002Fspan><span style=\"width:16%; background:#E7BE8E;\"><\u002Fspan><span style=\"width:30%; background:#B75B36;\"><\u002Fspan><span style=\"width:8%; background:#D9A63C;\"><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:7px;\">\n          <div style=\"flex:0 0 84px; font-size:11px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">Core API<\u002Fdiv>\n          <div style=\"flex:1; height:15px; background:#fff; border-radius:4px; display:flex; overflow:hidden;\"><span style=\"width:8%;\"><\u002Fspan><span style=\"width:22%; background:#C77E4C;\"><\u002Fspan><span style=\"width:24%; background:#B75B36;\"><\u002Fspan><span style=\"width:20%; background:#8B3E20;\"><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:8px;\">\n          <div style=\"flex:0 0 84px; font-size:11px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">Web Portal<\u002Fdiv>\n          <div style=\"flex:1; height:15px; background:#fff; border-radius:4px; display:flex; overflow:hidden;\"><span style=\"width:44%;\"><\u002Fspan><span style=\"width:24%; background:#B75B36;\"><\u002Fspan><span style=\"width:12%; background:#CBB8A0;\"><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px; display:flex; flex-wrap:wrap; gap:8px; font-size:9.5px; color:rgba(34,28,21,0.55);\">\n          <span style=\"display:flex; align-items:center; gap:4px;\"><span style=\"width:14px;height:8px;border-radius:2px;background:#C77E4C;\"><\u002Fspan>SIT<\u002Fspan>\n          <span style=\"display:flex; align-items:center; gap:4px;\"><span style=\"width:14px;height:8px;border-radius:2px;background:#E7BE8E;\"><\u002Fspan>Prep<\u002Fspan>\n          <span style=\"display:flex; align-items:center; gap:4px;\"><span style=\"width:14px;height:8px;border-radius:2px;background:#B75B36;\"><\u002Fspan>UAT<\u002Fspan>\n          <span style=\"display:flex; align-items:center; gap:4px;\"><span style=\"width:14px;height:8px;border-radius:2px;background:#8B3E20;\"><\u002Fspan>Reg<\u002Fspan>\n          <span style=\"display:flex; align-items:center; gap:4px;\"><span style=\"width:14px;height:8px;border-radius:2px;background:#D9A63C;\"><\u002Fspan>Signoff<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Step 2: Outsource -->\n  <div style=\"margin-top: 18px; background:#fff; border:1px solid rgba(34,28,21,0.1); border-radius:18px; padding:26px; box-shadow:0 8px 28px rgba(34,28,21,0.06);\">\n    <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"flex:0 0 30px; height:30px; border-radius:9px; background:#B75B36; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center; font-size:14px;\">2<\u002Fspan><h3 style=\"margin:0; font-size:20px; font-weight:800;\">👥 หน้า Outsource — คนของเรา<\u002Fh3><\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap:26px; margin-top:18px; align-items:start;\">\n      <div>\n        <p style=\"margin:0 0 12px; font-size:14px; line-height:1.7; color:rgba(34,28,21,0.7);\">ดูรายชื่อทีมทดสอบทั้งหมด พร้อมสถานะว่าใครถูกจองแล้ว ใครยังว่างในช่วงที่เลือก<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <div style=\"display:flex; gap:10px; font-size:13.5px; line-height:1.55;\"><span style=\"color:#B75B36; font-weight:800;\">•<\u002Fspan><div>เลือกช่วงวันที่ แล้วสลับดูแบบ <strong>“ถูกจอง / ว่าง”<\u002Fstrong> ได้<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; font-size:13.5px; line-height:1.55;\"><span style=\"color:#B75B36; font-weight:800;\">•<\u002Fspan><div>ดู <strong>ทักษะ (Skills)<\u002Fstrong> และประวัติ 3 โปรเจกต์ล่าสุดของแต่ละคน<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; font-size:13.5px; line-height:1.55;\"><span style=\"color:#B75B36; font-weight:800;\">•<\u002Fspan><div>🛠️ แก้ไข Skills และ ☂️ บันทึก <strong>วันลา (Leave Plan)<\u002Fstrong> ได้จากที่นี่<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:14px; background:rgba(183,91,54,0.08); border-left:3px solid #B75B36; border-radius:0 8px 8px 0; padding:10px 14px; font-size:12.5px; line-height:1.6; color:rgba(34,28,21,0.7);\">💡 วันลาที่บันทึกไว้จะถูกนับรวมกับภาระงาน ทำให้ระบบกันไม่ให้จองคนในวันที่ลาโดยอัตโนมัติ<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- outsource mock -->\n      <div style=\"background:#FBF6EF; border:1px solid rgba(34,28,21,0.1); border-radius:12px; padding:6px;\">\n        <div style=\"background:#F7EEE1; font-size:10px; font-weight:700; color:#B75B36; padding:5px 10px; border-radius:8px 8px 0 0;\">ถูกจองแล้ว (2)<\u002Fdiv>\n        <div style=\"background:rgba(29,158,117,0.07); border-bottom:1px solid rgba(34,28,21,0.06); padding:8px 10px; display:flex; align-items:center; gap:8px;\">\n          <span style=\"width:8px;height:8px;border-radius:50%;background:#1D9E75;\"><\u002Fspan>\n          <div style=\"flex:1;\"><div style=\"font-size:12px; font-weight:700;\">มะปราง<\u002Fdiv><div style=\"font-size:10px; color:rgba(34,28,21,0.5);\">Automation, API<\u002Fdiv><\u002Fdiv>\n          <span style=\"font-size:10px; color:#B75B36; font-weight:600;\">Core API · UAT<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background:rgba(29,158,117,0.07); padding:8px 10px; display:flex; align-items:center; gap:8px;\">\n          <span style=\"width:8px;height:8px;border-radius:50%;background:#1D9E75;\"><\u002Fspan>\n          <div style=\"flex:1;\"><div style=\"font-size:12px; font-weight:700;\">ต้นข้าว<\u002Fdiv><div style=\"font-size:10px; color:rgba(34,28,21,0.5);\">Manual, Mobile<\u002Fdiv><\u002Fdiv>\n          <span style=\"font-size:10px; color:#B75B36; font-weight:600;\">Mobile · SIT<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background:#F7EEE1; font-size:10px; font-weight:700; color:rgba(34,28,21,0.55); padding:5px 10px; margin-top:4px;\">ว่าง (1)<\u002Fdiv>\n        <div style=\"padding:8px 10px; display:flex; align-items:center; gap:8px;\">\n          <span style=\"width:8px;height:8px;border-radius:50%;background:rgba(34,28,21,0.25);\"><\u002Fspan>\n          <div style=\"flex:1;\"><div style=\"font-size:12px; font-weight:700;\">ฟ้าใส<\u002Fdiv><div style=\"font-size:10px; color:rgba(34,28,21,0.5);\">Performance<\u002Fdiv><\u002Fdiv>\n          <span style=\"font-size:10px; color:rgba(34,28,21,0.4);\">🛠️ &nbsp;☂️<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Step 3: Calendar -->\n  <div style=\"margin-top: 18px; background:#fff; border:1px solid rgba(34,28,21,0.1); border-radius:18px; padding:26px; box-shadow:0 8px 28px rgba(34,28,21,0.06);\">\n    <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"flex:0 0 30px; height:30px; border-radius:9px; background:#B75B36; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center; font-size:14px;\">3<\u002Fspan><h3 style=\"margin:0; font-size:20px; font-weight:800;\">📅 หน้า Calendar — ภาพรวมรายวัน<\u002Fh3><\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap:26px; margin-top:18px; align-items:start;\">\n      <div>\n        <p style=\"margin:0 0 12px; font-size:14px; line-height:1.7; color:rgba(34,28,21,0.7);\">ปฏิทินรายเดือนที่บอกในแต่ละวันว่า <strong>จองคนไปแล้วกี่คน จากที่ต้องการทั้งหมดกี่คน<\u002Fstrong><\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <div style=\"display:flex; gap:10px; font-size:13.5px; line-height:1.55;\"><span style=\"color:#B75B36; font-weight:800;\">•<\u002Fspan><div>ตัวเลขแบบ <strong style=\"color:#B75B36;\">จองแล้ว / ต้องการ<\u002Fstrong> ในแต่ละวัน<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; font-size:13.5px; line-height:1.55;\"><span style=\"color:#B75B36; font-weight:800;\">•<\u002Fspan><div>คลิกวันเพื่อดูว่าวันนั้นมีโปรเจกต์อะไรและใครถูกจองบ้าง<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; font-size:13.5px; line-height:1.55;\"><span style=\"color:#B75B36; font-weight:800;\">•<\u002Fspan><div>เห็นวันหยุด/วันเสาร์อาทิตย์ชัดเจน ช่วยวางแผนได้แม่นขึ้น<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- calendar mock -->\n      <div style=\"background:#FBF6EF; border:1px solid rgba(34,28,21,0.1); border-radius:12px; padding:12px;\">\n        <div style=\"display:grid; grid-template-columns: repeat(7,1fr); gap:4px; font-size:9px; color:rgba(34,28,21,0.45); text-align:center; margin-bottom:4px;\">\n          <span>จ<\u002Fspan><span>อ<\u002Fspan><span>พ<\u002Fspan><span>พฤ<\u002Fspan><span>ศ<\u002Fspan><span style=\"color:#c0392b;\">ส<\u002Fspan><span style=\"color:#c0392b;\">อา<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns: repeat(7,1fr); gap:4px;\">\n          <div style=\"background:#fff; border-radius:6px; padding:5px 2px; text-align:center; min-height:38px;\"><div style=\"font-size:9px; color:rgba(34,28,21,0.4);\">14<\u002Fdiv><div style=\"font-size:11px; font-weight:800; color:#B75B36;\">3/5<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff; border-radius:6px; padding:5px 2px; text-align:center; min-height:38px;\"><div style=\"font-size:9px; color:rgba(34,28,21,0.4);\">15<\u002Fdiv><div style=\"font-size:11px; font-weight:800; color:#B75B36;\">4/5<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff; border-radius:6px; padding:5px 2px; text-align:center; min-height:38px;\"><div style=\"font-size:9px; color:rgba(34,28,21,0.4);\">16<\u002Fdiv><div style=\"font-size:11px; font-weight:800; color:#B75B36;\">5/5<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff; border-radius:6px; padding:5px 2px; text-align:center; min-height:38px;\"><div style=\"font-size:9px; color:rgba(34,28,21,0.4);\">17<\u002Fdiv><div style=\"font-size:11px; font-weight:800; color:#B75B36;\">2/5<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff; border-radius:6px; padding:5px 2px; text-align:center; min-height:38px;\"><div style=\"font-size:9px; color:rgba(34,28,21,0.4);\">18<\u002Fdiv><div style=\"font-size:11px; font-weight:800; color:#B75B36;\">4/5<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#EDE3D4; border-radius:6px; padding:5px 2px; text-align:center; min-height:38px;\"><div style=\"font-size:9px; color:rgba(34,28,21,0.3);\">19<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#EDE3D4; border-radius:6px; padding:5px 2px; text-align:center; min-height:38px;\"><div style=\"font-size:9px; color:rgba(34,28,21,0.3);\">20<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:8px; font-size:10px; text-align:center; color:rgba(34,28,21,0.5);\"><strong style=\"color:#B75B36;\">3/5<\u002Fstrong> = จองแล้ว 3 จากที่ต้องการ 5 คน<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Step 4: Dashboard -->\n  <div style=\"margin-top: 18px; background:#fff; border:1px solid rgba(34,28,21,0.1); border-radius:18px; padding:26px; box-shadow:0 8px 28px rgba(34,28,21,0.06);\">\n    <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"flex:0 0 30px; height:30px; border-radius:9px; background:#B75B36; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center; font-size:14px;\">4<\u002Fspan><h3 style=\"margin:0; font-size:20px; font-weight:800;\">📈 หน้า Dashboard — รายงานสรุป<\u002Fh3><\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap:26px; margin-top:18px; align-items:start;\">\n      <div>\n        <p style=\"margin:0 0 12px; font-size:14px; line-height:1.7; color:rgba(34,28,21,0.7);\">ภาพรวมตัวเลขสำหรับหัวหน้าทีมและผู้บริหาร ใช้ตัดสินใจและรายงานผล<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <div style=\"display:flex; gap:10px; font-size:13.5px; line-height:1.55;\"><span style=\"color:#B75B36; font-weight:800;\">•<\u002Fspan><div><strong>Man-day รวม<\u002Fstrong> และจำนวนคนที่ถูกจองในเดือนนั้น<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; font-size:13.5px; line-height:1.55;\"><span style=\"color:#B75B36; font-weight:800;\">•<\u002Fspan><div>กราฟ <strong>MD แยกตาม App และ Phase<\u002Fstrong><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; font-size:13.5px; line-height:1.55;\"><span style=\"color:#B75B36; font-weight:800;\">•<\u002Fspan><div>มุมมอง <strong>Signoff<\u002Fstrong> (ติดตามเอกสารปิดงาน) และ <strong>By Lead<\u002Fstrong> (แยกตามหัวหน้า)<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- dashboard mock -->\n      <div style=\"background:#FBF6EF; border:1px solid rgba(34,28,21,0.1); border-radius:12px; padding:14px;\">\n        <div style=\"display:flex; gap:8px; margin-bottom:12px;\">\n          <div style=\"flex:1; background:#fff; border-radius:9px; padding:9px 10px;\"><div style=\"font-size:9px; color:rgba(34,28,21,0.5);\">Total MD<\u002Fdiv><div style=\"font-size:18px; font-weight:800; color:#B75B36;\">248<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1; background:#fff; border-radius:9px; padding:9px 10px;\"><div style=\"font-size:9px; color:rgba(34,28,21,0.5);\">Booked OS<\u002Fdiv><div style=\"font-size:18px; font-weight:800; color:#B75B36;\">18<span style=\"font-size:11px; font-weight:400; color:rgba(34,28,21,0.5);\">/24<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border-radius:9px; padding:12px;\">\n          <div style=\"font-size:10px; font-weight:700; color:rgba(34,28,21,0.6); margin-bottom:10px;\">MD by App<\u002Fdiv>\n          <div style=\"display:flex; align-items:flex-end; gap:10px; height:70px;\">\n            <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;\"><div style=\"width:100%; height:64px; display:flex; flex-direction:column-reverse; border-radius:4px; overflow:hidden;\"><span style=\"background:#C77E4C; height:24%;\"><\u002Fspan><span style=\"background:#B75B36; height:46%;\"><\u002Fspan><span style=\"background:#8B3E20; height:30%;\"><\u002Fspan><\u002Fdiv><span style=\"font-size:8px; color:rgba(34,28,21,0.5);\">Pay<\u002Fspan><\u002Fdiv>\n            <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;\"><div style=\"width:100%; height:44px; display:flex; flex-direction:column-reverse; border-radius:4px; overflow:hidden;\"><span style=\"background:#E7BE8E; height:40%;\"><\u002Fspan><span style=\"background:#B75B36; height:60%;\"><\u002Fspan><\u002Fdiv><span style=\"font-size:8px; color:rgba(34,28,21,0.5);\">Mob<\u002Fspan><\u002Fdiv>\n            <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;\"><div style=\"width:100%; height:56px; display:flex; flex-direction:column-reverse; border-radius:4px; overflow:hidden;\"><span style=\"background:#C77E4C; height:30%;\"><\u002Fspan><span style=\"background:#B75B36; height:40%;\"><\u002Fspan><span style=\"background:#8B3E20; height:30%;\"><\u002Fspan><\u002Fdiv><span style=\"font-size:8px; color:rgba(34,28,21,0.5);\">API<\u002Fspan><\u002Fdiv>\n            <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;\"><div style=\"width:100%; height:36px; display:flex; flex-direction:column-reverse; border-radius:4px; overflow:hidden;\"><span style=\"background:#B75B36; height:70%;\"><\u002Fspan><span style=\"background:#CBB8A0; height:30%;\"><\u002Fspan><\u002Fdiv><span style=\"font-size:8px; color:rgba(34,28,21,0.5);\">Web<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Step 5: Users -->\n  <div style=\"margin-top: 18px; background:#fff; border:1px solid rgba(34,28,21,0.1); border-radius:18px; padding:26px; box-shadow:0 8px 28px rgba(34,28,21,0.06);\">\n    <div style=\"display:flex; align-items:center; gap:10px; flex-wrap:wrap;\"><span style=\"flex:0 0 30px; height:30px; border-radius:9px; background:#B75B36; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center; font-size:14px;\">5<\u002Fspan><h3 style=\"margin:0; font-size:20px; font-weight:800;\">🗂️ หน้า Users<\u002Fh3><span style=\"font-size:11px; font-weight:700; color:#B75B36; background:rgba(183,91,54,0.13); padding:3px 9px; border-radius:6px;\">เฉพาะ Admin<\u002Fspan><\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap:26px; margin-top:18px; align-items:start;\">\n      <div>\n        <p style=\"margin:0 0 12px; font-size:14px; line-height:1.7; color:rgba(34,28,21,0.7);\">สำหรับผู้ดูแลระบบเท่านั้น ใช้จัดการบัญชีผู้ใช้ทั้งหมด<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <div style=\"display:flex; gap:10px; font-size:13.5px; line-height:1.55;\"><span style=\"color:#B75B36; font-weight:800;\">•<\u002Fspan><div>เพิ่มผู้ใช้ใหม่ (ตั้งรหัสผ่านเริ่มต้นให้อัตโนมัติ)<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; font-size:13.5px; line-height:1.55;\"><span style=\"color:#B75B36; font-weight:800;\">•<\u002Fspan><div>กำหนดสิทธิ์ <strong>Admin / User<\u002Fstrong> และเปิด–ปิดการใช้งานบัญชี<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- users mock -->\n      <div style=\"background:#FBF6EF; border:1px solid rgba(34,28,21,0.1); border-radius:12px; padding:6px;\">\n        <div style=\"display:flex; align-items:center; padding:8px 10px; border-bottom:1px solid rgba(34,28,21,0.08);\">\n          <div style=\"flex:1; font-size:11px; font-weight:700;\">สมชาย ใจดี<\u002Fdiv><span style=\"font-size:9px; font-weight:700; color:#B75B36; background:rgba(183,91,54,0.13); padding:2px 7px; border-radius:5px;\">Admin<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; padding:8px 10px; border-bottom:1px solid rgba(34,28,21,0.08);\">\n          <div style=\"flex:1; font-size:11px; font-weight:700;\">มานี รักงาน<\u002Fdiv><span style=\"font-size:9px; font-weight:700; color:rgba(34,28,21,0.55); background:#EDE3D4; padding:2px 7px; border-radius:5px;\">User<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; padding:8px 10px;\">\n          <div style=\"flex:1; font-size:11px; font-weight:700;\">ปิติ ตั้งใจ<\u002Fdiv><span style=\"font-size:9px; font-weight:700; color:rgba(34,28,21,0.55); background:#EDE3D4; padding:2px 7px; border-radius:5px;\">User<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ GOLDEN RULES ============ -->\n  <div style=\"margin-top: 46px; background: linear-gradient(135deg,#8F4527,#B75B36); border-radius:20px; padding:30px 32px; color:#fff; box-shadow:0 14px 40px rgba(143,69,39,0.28);\">\n    <h2 style=\"margin:0 0 4px; font-size:22px; font-weight:800;\">⭐ กฎสำคัญที่ควรจำ<\u002Fh2>\n    <p style=\"margin:0 0 20px; font-size:14px; color:rgba(255,255,255,0.82);\">4 ข้อนี้จะช่วยให้การวางแผนของคุณไม่ผิดพลาด<\u002Fp>\n    <div style=\"display:grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap:14px;\">\n      <div style=\"background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.2); border-radius:12px; padding:16px;\"><div style=\"font-size:15px; font-weight:800;\">1 คน = สูงสุด 1 MD/วัน<\u002Fdiv><div style=\"font-size:12.5px; color:rgba(255,255,255,0.8); margin-top:5px; line-height:1.55;\">ระบบจะเตือนและกันการจองที่ทำให้เกิน 1.0 ในวันเดียว<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.2); border-radius:12px; padding:16px;\"><div style=\"font-size:15px; font-weight:800;\">วันลานับรวมด้วย<\u002Fdiv><div style=\"font-size:12.5px; color:rgba(255,255,255,0.8); margin-top:5px; line-height:1.55;\">วันที่คนลา จะจองงานทับไม่ได้โดยอัตโนมัติ<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.2); border-radius:12px; padding:16px;\"><div style=\"font-size:15px; font-weight:800;\">เลื่อน Phase = เลื่อนการจอง<\u002Fdiv><div style=\"font-size:12.5px; color:rgba(255,255,255,0.8); margin-top:5px; line-height:1.55;\">แก้วันเริ่ม Phase ระบบเลื่อนการจองในช่วงนั้นตามให้<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.2); border-radius:12px; padding:16px;\"><div style=\"font-size:15px; font-weight:800;\">ปิดโปรเจกต์ = ปลดการจอง<\u002Fdiv><div style=\"font-size:12.5px; color:rgba(255,255,255,0.8); margin-top:5px; line-height:1.55;\">เมื่อ Inactive โปรเจกต์ การจองทุกตัวจะถูกยกเลิก คนกลับมาว่าง<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:28px; text-align:center; font-size:12px; color:rgba(34,28,21,0.4);\">คู่มือการใช้งาน PQA Resource Management • จัดทำเพื่อความเข้าใจของผู้ใช้งาน<\u002Fdiv>\n\n<\u002Fdiv>\n\n\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
