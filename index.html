<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบงานล่าสุด</title>
  
  <!-- บล็อกแคชของเบราว์เซอร์อย่างเด็ดขาด ให้ดึงปุ่มเวอร์ชันล่าสุดเสมอ -->
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="0">

  <!-- ดึงฟอนต์ Mali จาก Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mali:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Mali", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #FAF7F2; /* โทนซอฟต์ครีมสบายตา */
      color: #4A4A4A;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: #ffffff;
      border-radius: 16px; /* มุมโค้งมน */
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); /* เงาซอฟต์แมตต์ */
      max-width: 400px;
      width: 90%;
    }
    h2 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #333333;
    }
    p {
      font-size: 16px;
      color: #777777;
      margin-bottom: 30px;
    }
    .btn-link {
      display: inline-block;
      background-color: #4A6FFF; /* สีปุ่มเด่นชัด */
      color: #ffffff;
      text-decoration: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 600;
      transition: background-color 0.2s;
    }
    .btn-link:hover {
      background-color: #3556D9;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>กรุณากดปุ่มด้านล่าง เพื่อเข้าใช้งาน</h2>
    <p>ระบบ PQA Resource Management เวอร์ชันล่าสุด</p>
    
    <!-- เปลี่ยนลิงก์ใหม่ที่ตรงนี้ได้ตลอดเวลาเลยค่ะ -->
    <a href="https://script.google.com/macros/s/AKfycbwurlRJ6gBj6HugNbFmwhuQYqi8HdzcudZzFzM2TJQngTa_cYhFCmqeFr9F5fbigonAEw/exec" class="btn-link">
      คลิกเพื่อเข้าสู่ระบบ
    </a>
  </div>

</body>
</html>
