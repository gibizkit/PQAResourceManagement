<style>
  /* ============ PAGE-LOCAL VARS (ยังไม่มีใน theme.css — เสนอย้ายเข้า common ทีหลัง) ============ */

<script type="module">
import {
  supabase, $, toast, esc, d2s, dDisp, dDispShort, parseInputDate,
  leaveMD, LEAVE_ABBR, isWknd, loadHolidays
} from './common.js';

/* ============ FALLBACK MASTER DATA (ใช้เมื่อโหลดจาก DB ไม่ได้) ============ */
const DEFAULT_ROLE_MAP = {
  SENIOR: { name: '1.Senior Tester', rank: 1 },
  TESTER: { name: '2.Tester',        rank: 2 },
  JUNIOR: { name: '3.Junior Tester', rank: 3 }
};
const DEFAULT_PHASE_MAP = {
  SIT:     { name: 'SIT',      sort: 10 },
  TCPREP:  { name: 'TC Prep',  sort: 20 },
  UAT:     { name: 'UAT',      sort: 30 },
  REG:     { name: 'Reg',      sort: 40 },
  SUPPORT: { name: 'Support',  sort: 50 }
};

/* ============ STATE ============ */
const S = {
  holidays: {},
  roleMap: {},
  phaseMap: {},
  osStaff: [],          // [{resourceId, eid, fullName, nickname, nicknameName, roleCode, skills, endDate}]
  osByResourceId: {},
  projMap: {},           // project_key -> {name, uatLead}
  projectsActive: [],    // [{project_key, project_name}]
  phasesByProject: {},   // project_key -> [{phase_code, phase_label, start_date, end_date}]
  bookings: [],
  leaves: [],
  bookingsByResource: {},
  leavesByResource: {},
  range: { s: null, e: null }
};

// Manage Booking modal globals
let MB_NAME = null;   // resourceId
let MB_DATE = null;   // 'yyyy-MM-dd'
let MB_EDIT_ID = null; // booking_id ที่กำลังแก้ (null = add mode)

// Leave Plan modal globals
let LP_RESOURCE_ID = null;
let LP_RECORDS = [];
let LP_EDIT_ID = null;

/* ============ HELPERS ============ */
function fmtMD(v) {
  if (v == null || v === '') return '0';
  const n = Number(v);
  if (isNaN(n)) return '0';
  return Number.isInteger(n) ? String(n) : n.toFixed(1);
}

function truncate(str, n) {
  if (!str) return '';
  return str.length > n ? str.slice(0, n) + '…' : str;
}

function addDaysToDate(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function addDaysStr(ds, n) {
  return d2s(addDaysToDate(new Date(ds + 'T00:00:00'), n));
}

function monthLabel(ds) {
  const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const [y, m] = ds.split('-');
  return `${names[Number(m) - 1]} ${y}`;
}

function roleLabel(roleCode) {
  return (S.roleMap[roleCode] || {}).name || roleCode || '';
}

function getDayRange() {
  const days = [];
  let d = new Date(S.range.s + 'T00:00:00');
  const end = new Date(S.range.e + 'T00:00:00');
  while (d <= end) {
    days.push(d2s(d));
    d.setDate(d.getDate() + 1);
  }
  return days;
}

/**
 * แปลง error จาก RPC/RLS ให้เป็นข้อความไทยที่เข้าใจง่าย
 * - can_write() ปฏิเสธ / RLS policy violation → toast "ไม่มีสิทธิ์แก้ไขข้อมูล"
 * - fn_save_booking / fn_save_bookings_batch คืนวันที่ MD เกิน (yyyy-mm-dd ในข้อความ) → error ใต้ฟอร์ม
 * - อื่นๆ → error ใต้ฟอร์ม (หรือ toast ถ้าไม่มี errEl)
 */
function handleWriteError(error, errEl) {
  const msg = (error && error.message) || String(error || '');
  if (
    (error && error.code === '42501') ||
    /row-level security/i.test(msg) ||
    /สิทธิ์/i.test(msg)
  ) {
    toast('ไม่มีสิทธิ์แก้ไขข้อมูล', true);
    return;
  }
  const dates = msg.match(/\d{4}-\d{2}-\d{2}/g);
  if (dates && dates.length) {
    const disp = [...new Set(dates)].map(dDispShort).join(', ');
    const text = `วันที่ ${disp} มีการ Booking เกิน MD ให้ปรับปรุง Start Date, End Date`;
    if (errEl) errEl.textContent = text; else toast(text, true);
    return;
  }
  const text = 'บันทึกไม่สำเร็จ: ' + msg;
  if (errEl) errEl.textContent = text; else toast(text, true);
}

/* ============ AUTH ============ */
$('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = $('loginBtn');
  btn.disabled = true;
  btn.textContent = 'กำลังเข้าสู่ระบบ...';
  $('loginErr').textContent = '';

  const { error } = await supabase.auth.signInWithPassword({
    email: $('email').value.trim(),
    password: $('password').value
  });

  btn.disabled = false;
  btn.textContent = 'เข้าสู่ระบบ';

  if (error) {
    $('loginErr').textContent = error.message || 'เข้าสู่ระบบไม่สำเร็จ';
  }
});

$('logoutBtn').addEventListener('click', async () => {
  await supabase.auth.signOut();
});

supabase.auth.onAuthStateChange((_evt, session) => {
  if (session) showApp(session);
  else showLogin();
});

(async () => {
  const { data } = await supabase.auth.getSession();
  if (data.session) showApp(data.session);
})();

function showLogin() {
  $('app').classList.add('hidden');
  $('loginPage').classList.remove('hidden');
}

async function showApp(session) {
  $('loginPage').classList.add('hidden');
  $('app').classList.remove('hidden');

  let who = session.user.email;
  let role = '';
  const { data: u } = await supabase.from('app_user').select('display_name,app_role')
    .eq('email', session.user.email).maybeSingle();
  if (u) {
    who = u.display_name;
    role = u.app_role;
  }
  $('who').innerHTML = `<b>${esc(who)}</b>${role ? ` · ${esc(role)}` : ''}`;

  await loadAll();
}

/* ============ LOAD MASTER + RANGE DATA ============ */
function setDefaultRangeIfEmpty() {
  if (S.range.s && S.range.e) return;
  const today = new Date();
  S.range = {
    s: d2s(addDaysToDate(today, -10)),
    e: d2s(addDaysToDate(today, 30))
  };
  $('fStart').value = dDisp(S.range.s);
  $('fEnd').value = dDisp(S.range.e);
}

async function loadAll() {
  $('osTbody').innerHTML = '<tr><td class="loading">กำลังโหลด...</td></tr>';
  try {
    const [holidays, roleRows, phaseRows, staffRows, resRows, projRows, phRows] = await Promise.all([
      loadHolidays(),
      supabase.from('tester_role').select('role_code,role_name,sort_order').order('sort_order'),
      supabase.from('phase').select('phase_code,phase_name,sort_order').order('sort_order'),
      supabase.from('outsource_staff')
        .select('eid,en_fullname,nickname,nickname_name,role_code,skills,end_date,is_active')
        .eq('is_active', true),
      supabase.from('resource').select('resource_id,outsource_eid')
        .eq('resource_type', 'outsource').eq('is_active', true),
      supabase.from('v_project_wide').select('project_key,project_name,uat_lead').eq('is_active', true),
      supabase.from('project_phase').select('project_key,phase_code,phase_label,start_date,end_date')
    ]);

    S.holidays = holidays || {};

    S.roleMap = {};
    (roleRows.data || []).forEach((r, i) => {
      S.roleMap[r.role_code] = { name: r.role_name, rank: r.sort_order ?? i };
    });
    if (!Object.keys(S.roleMap).length) S.roleMap = DEFAULT_ROLE_MAP;

    S.phaseMap = {};
    (phaseRows.data || []).forEach((p, i) => {
      S.phaseMap[p.phase_code] = { name: p.phase_name, sort: p.sort_order ?? i };
    });
    if (!Object.keys(S.phaseMap).length) S.phaseMap = DEFAULT_PHASE_MAP;

    const eidToResId = {};
    (resRows.data || []).forEach(r => { eidToResId[r.outsource_eid] = r.resource_id; });

    S.osStaff = (staffRows.data || [])
      .map(s => ({
        resourceId: eidToResId[s.eid],
        eid: s.eid,
        fullName: s.en_fullname,
        nickname: s.nickname,
        nicknameName: s.nickname_name,
        roleCode: s.role_code,
        skills: s.skills || '',
        endDate: s.end_date
      }))
      .filter(p => !!p.resourceId); // ต้องมีแถวใน resource ผูกอยู่ (สร้างจาก sync trigger)

    S.osByResourceId = {};
    S.osStaff.forEach(p => { S.osByResourceId[p.resourceId] = p; });

    S.projMap = {};
    (projRows.data || []).forEach(p => {
      S.projMap[p.project_key] = { name: p.project_name, uatLead: p.uat_lead };
    });
    S.projectsActive = (projRows.data || [])
      .map(p => ({ project_key: p.project_key, project_name: p.project_name }))
      .sort((a, b) => (a.project_name || '').localeCompare(b.project_name || ''));

    S.phasesByProject = {};
    (phRows.data || []).forEach(ph => {
      if (!S.projMap[ph.project_key]) return; // เฉพาะ project ที่ active
      (S.phasesByProject[ph.project_key] = S.phasesByProject[ph.project_key] || []).push(ph);
    });

    setDefaultRangeIfEmpty();
    await reloadRangeData();
    renderGrid();
  } catch (e) {
    $('osTbody').innerHTML =
      `<tr><td class="loading" style="color:var(--danger)">โหลดข้อมูลไม่สำเร็จ: ${esc(e.message || String(e))}</td></tr>`;
  }
}

async function reloadRangeData() {
  const s = S.range.s, e = S.range.e;
  const [bkRes, lvRes] = await Promise.all([
    supabase.from('booking')
      .select('booking_id,project_key,resource_id,phase_code,start_date,end_date,md,is_active')
      .eq('is_active', true).lte('start_date', e).gte('end_date', s),
    supabase.from('leave_plan')
      .select('leave_id,resource_id,start_date,end_date,leave_slot,md,is_active,is_deleted,source_system')
      .eq('is_active', true).eq('is_deleted', false).lte('start_date', e).gte('end_date', s)
  ]);
  if (bkRes.error) { toast('โหลด Booking ไม่สำเร็จ: ' + bkRes.error.message, true); }
  if (lvRes.error) { toast('โหลด Leave ไม่สำเร็จ: ' + lvRes.error.message, true); }
  S.bookings = bkRes.data || [];
  S.leaves = lvRes.data || [];
  reindexBookings();
}

function reindexBookings() {
  S.bookingsByResource = {};
  S.bookings.forEach(b => {
    (S.bookingsByResource[b.resource_id] = S.bookingsByResource[b.resource_id] || []).push(b);
  });
  S.leavesByResource = {};
  S.leaves.forEach(l => {
    (S.leavesByResource[l.resource_id] = S.leavesByResource[l.resource_id] || []).push(l);
  });
}

/* ============ GRID RENDER ============ */
function renderGrid() {
  if (!S.range.s || !S.range.e) return;
  const days = getDayRange();
  renderThead(days);
  renderTbody(days);
}

function renderThead(days) {
  const todayStr = d2s(new Date());

  const groups = [];
  days.forEach(ds => {
    const ym = ds.slice(0, 7);
    const last = groups[groups.length - 1];
    if (last && last.ym === ym) last.count++;
    else groups.push({ ym, count: 1, label: monthLabel(ds) });
  });

  const row1 = `<tr>
    <th class="corner col-name" rowspan="3">Name</th>
    <th class="corner col-skills" rowspan="3">Skills</th>
    <th class="corner col-action" rowspan="3">☂️</th>
    ${groups.map(g => `<th class="th-month" colspan="${g.count}">${esc(g.label)}</th>`).join('')}
  </tr>`;

  const row2 = `<tr>
    ${days.map(ds => {
      const d = new Date(ds + 'T00:00:00');
      const wknd = isWknd(d, S.holidays);
      const today = ds === todayStr;
      return `<th class="th-day${wknd ? ' wknd' : ''}${today ? ' today-col' : ''}" title="${dDisp(ds)}">${String(d.getDate()).padStart(2, '0')}</th>`;
    }).join('')}
  </tr>`;

  const row3 = `<tr>
    ${days.map(ds => {
      const wknd = isWknd(new Date(ds + 'T00:00:00'), S.holidays);
      const total = S.bookings
        .filter(b => ds >= b.start_date && ds <= b.end_date)
        .reduce((sum, b) => sum + Number(b.md), 0);
      return `<th class="th-count${wknd ? ' wknd' : ''}">${total ? fmtMD(total) : ''}</th>`;
    }).join('')}
  </tr>`;

  $('osThead').innerHTML = row1 + row2 + row3;
}

function matchesFilters(p) {
  const nameQ = $('fName').value.trim().toLowerCase();
  const skillQ = $('fSkills').value.trim().toLowerCase();
  if (nameQ) {
    const hay = `${p.fullName || ''} ${p.nickname || ''} ${p.nicknameName || ''}`.toLowerCase();
    if (!hay.includes(nameQ)) return false;
  }
  if (skillQ) {
    if (!(p.skills || '').toLowerCase().includes(skillQ)) return false;
  }
  return true;
}

function computeConflictMap(days) {
  const map = {};
  S.osStaff.forEach(p => {
    const bk = S.bookingsByResource[p.resourceId] || [];
    const lv = S.leavesByResource[p.resourceId] || [];
    if (!bk.length && !lv.length) return;
    const bad = [];
    days.forEach(ds => {
      const bkMD = bk.filter(b => ds >= b.start_date && ds <= b.end_date)
        .reduce((s, b) => s + Number(b.md), 0);
      const lvRow = lv.find(l => ds >= l.start_date && ds <= l.end_date);
      const lvMD = lvRow ? Number(lvRow.md) : 0;
      if (bkMD + lvMD > 1.0) bad.push(ds);
    });
    if (bad.length) map[p.resourceId] = bad;
  });
  return map;
}

function buildDayCell(p, ds) {
  const d = new Date(ds + 'T00:00:00');
  const wknd = isWknd(d, S.holidays);
  const bk = (S.bookingsByResource[p.resourceId] || []).filter(b => ds >= b.start_date && ds <= b.end_date);
  const bkMD = bk.reduce((s, b) => s + Number(b.md), 0);
  const leave = (S.leavesByResource[p.resourceId] || []).find(l => ds >= l.start_date && ds <= l.end_date);
  const lvMD = leave ? Number(leave.md) : 0;

  let cls = 'td-day';
  let content = '';
  let clickable = true;

  if (wknd) {
    cls += ' wknd';
    clickable = false;
  } else if (leave) {
    cls += ' leave';
    content = LEAVE_ABBR[leave.leave_slot] || '';
  } else if (bkMD >= 1) {
    cls += ' full';
  } else if (bkMD === 0.5) {
    cls += ' half';
    content = '0.5';
  }

  const titleLines = [];
  bk.forEach(b => {
    const proj = S.projMap[b.project_key] || {};
    const ph = S.phaseMap[b.phase_code] || {};
    titleLines.push(`${proj.name || b.project_key} | ${ph.name || b.phase_code} [MD:${fmtMD(b.md)}]`);
  });
  if (leave) titleLines.push(`Leave: ${leave.leave_slot}`);
  const titleAttr = titleLines.length ? ` title="${esc(titleLines.join('\n'))}"` : '';
  const onclick = clickable ? ` onclick="openManageBooking('${p.resourceId}','${ds}')"` : '';

  return `<td class="${cls}"${titleAttr}${onclick}>${content}</td>`;
}

function buildRow(p, days, conflictMap) {
  const conflictDates = conflictMap[p.resourceId] || [];
  const isConflict = conflictDates.length > 0;
  const roleName = roleLabel(p.roleCode);
  const nameTitle = isConflict
    ? ` title="มีวันที่ Book เกิน MD: ${esc(conflictDates.map(dDispShort).join(', '))}"`
    : '';
  const nameCls = isConflict ? 'os-name conflict' : 'os-name';
  const dayCells = days.map(ds => buildDayCell(p, ds)).join('');

  return `<tr>
    <td class="col-name sticky-l0">
      <div class="${nameCls}"${nameTitle}>${isConflict ? '⚠️ ' : ''}${esc(p.nicknameName || p.fullName)}</div>
      <div class="role-badge">${esc(roleName)}</div>
    </td>
    <td class="col-skills sticky-l1" title="${esc(p.skills)}">${esc(truncate(p.skills, 42))}</td>
    <td class="col-action sticky-l2 center">
      <button class="btn sm" onclick="openLeavePlan('${p.resourceId}')">☂️</button>
    </td>
    ${dayCells}
  </tr>`;
}

function renderTbody(days) {
  const conflictMap = computeConflictMap(days);
  let list = S.osStaff.filter(matchesFilters);

  const chkConflict = $('chkConflict').checked;
  if (chkConflict) list = list.filter(p => (conflictMap[p.resourceId] || []).length > 0);

  const withMeta = list.map(p => ({
    p,
    rank: (S.roleMap[p.roleCode] || {}).rank ?? 99,
    booked: !!(S.bookingsByResource[p.resourceId] && S.bookingsByResource[p.resourceId].length)
  }));

  const sortFn = (a, b) => (a.rank - b.rank) || (a.p.nicknameName || '').localeCompare(b.p.nicknameName || '');
  const groupBy = $('chkGroupBy').checked;
  const colspan = 3 + days.length;
  let html = '';

  if (groupBy) {
    const bookedList = withMeta.filter(x => x.booked).sort(sortFn);
    const vacantList = withMeta.filter(x => !x.booked).sort(sortFn);
    if (bookedList.length) {
      html += `<tr class="grp-sep"><td colspan="${colspan}">📌 Booked (${bookedList.length} คน)</td></tr>`;
      html += bookedList.map(x => buildRow(x.p, days, conflictMap)).join('');
    }
    if (vacantList.length) {
      html += `<tr class="grp-sep"><td colspan="${colspan}">⭕ Vacant (${vacantList.length} คน)</td></tr>`;
      html += vacantList.map(x => buildRow(x.p, days, conflictMap)).join('');
    }
  } else {
    html = withMeta.sort(sortFn).map(x => buildRow(x.p, days, conflictMap)).join('');
  }

  if (!html) {
    html = chkConflict
      ? `<tr><td colspan="${colspan}" class="loading">ไม่พบ Booking Conflict</td></tr>`
      : `<tr><td colspan="${colspan}" class="loading">ไม่พบข้อมูล</td></tr>`;
  }

  $('osTbody').innerHTML = html;
  $('osCount').textContent = list.length;
}

async function lpLoad() {

    .eq('resource_id', LP_RESOURCE_ID)
    .eq('is_active', true)

    .order('start_date', { ascending: false });

function lpRenderTable() {
  if (!LP_RECORDS.length) {
    $('lpRows').innerHTML = '<tr><td colspan="4" class="loading">ไม่มีข้อมูลการลา</td></tr>';
    return;
  }
  $('lpRows').innerHTML = LP_RECORDS.map(r => {

    const actions = readOnly
      ? `<span class="muted" title="ข้อมูลจาก SharePoint แก้ที่ต้นทาง">🔒</span>`
      : `<button class="btn sm" onclick="lpEditInline(${r.leave_id})">✏️</button>
         <button class="btn sm danger" onclick="lpDeleteRow(${r.leave_id})">🗑️</button>`;
    return `<tr>
      <td>${esc(r.leave_slot)}</td>
      <td>${dDisp(r.start_date)}</td>
      <td>${dDisp(r.end_date)}</td>
      <td class="center">${actions}</td>
    </tr>`;
  }).join('');
}

function lpOverlapDates(start, end, excludeId) {
  const bad = [];
  LP_RECORDS.forEach(r => {
    if (excludeId && r.leave_id === excludeId) return;
    if (start <= r.end_date && end >= r.start_date) {
      const os = start > r.start_date ? start : r.start_date;
      const oe = end < r.end_date ? end : r.end_date;
      let d = os;
      while (d <= oe) {
        bad.push(d);
        d = addDaysStr(d, 1);
      }
    }
  });
  return bad;
}

window.lpSaveAdd = async function () {
  const err = $('lpAddError');
  err.textContent = '';

  const btn = $('lpSaveBtn');

  const md = leaveMD(type);
  let res;
  if (LP_EDIT_ID) {
    res = await supabase.from('leave_plan')
      .update({ start_date: s, end_date: e, leave_slot: type, md })
      .eq('leave_id', LP_EDIT_ID);
  } else {
    res = await supabase.from('leave_plan').insert({
      leave_id: Date.now(),
      resource_id: LP_RESOURCE_ID,
      start_date: s,
      end_date: e,
      leave_slot: type,
      md,
      is_active: true,
      is_deleted: false,
      source_system: 'app'
    });
  }

  btn.disabled = false;
  btn.textContent = 'บันทึก';

  if (res.error) { handleWriteError(res.error, err); return; }

  toast(LP_EDIT_ID ? 'อัปเดต Leave แล้ว ✓' : 'เพิ่ม Leave แล้ว ✓');
  window.lpCancelAdd();
  await lpLoad();
  await reloadRangeData();
  renderGrid();
};

window.lpDeleteRow = async function (leaveId) {
  if (!confirm('ยืนยันลบ Leave นี้?')) return;
  const { error } = await supabase.from('leave_plan').update({ is_active: false }).eq('leave_id', leaveId);
  if (error) { handleWriteError(error, null); return; }
  toast('ลบ Leave แล้ว ✓');
  await lpLoad();
  await reloadRangeData();
  renderGrid();
};
</script>
</body>
</html>
